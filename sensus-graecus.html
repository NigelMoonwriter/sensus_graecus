    path:["PIE *leh2- / *sleh2-","Griego \u03BB\u03AE\u03B8\u03B7 (lethe, olvido)","Griego \u1F00\u03BB\u03AE\u03B8\u03B5\u03B9\u03B1 (aletheia: a-privativo + lethe)","Latin veritas (traduccion, no cognado)","Prestamos: lealtad (via latin)"],
    notes:"Una de las palabras mas debatidas de la filosofia. La etimologia tradicional la descompone como a-privativo + lethe (olvido): lo que no se olvida, lo desvelado. Heidegger recupero esta lectura para su concepto de verdad como desocultamiento (Unverborgenheit). No es coincidencia con el latin veritas, que viene de otra raiz (*wer-, confianza)."

{

  themes:["IV","V"],
  level:"avanzado",
  ipa:"/\u00E0i\u0301.t\u02B0er/",
  defs:["El cielo superior, la region por encima de la luna; el quinto elemento.","En fisica antigua: la sustancia pura e incorruptible de la que estan hechos los astros."],
  etym:{
    pie:"*h2eyther- (quemar, brillar, cielo ardiente)",
    path:["PIE *h2eyther-","Griego \u03B1\u1F30\u03B8\u1F74\u03C1 (aither, cielo brillante)","Latin aether (prestamo)","Espanol: etero, etereo, eternidad (etimologia popular)"],
    notes:"Aristoteles anadio el eter como quinto elemento (quintaesencia) a los cuatro de Empedocles (tierra, agua, aire, fuego). El eter era el elemento de los cielos, incorruptible y eterno, en contraste con los cuatro elementos sublunares sujetos a cambio y corrupcion. Newton lo recupero en optica; la fisica lo refuto con el experimento Michelson-Morley (1887)."
  },

  cmp:{griego:"\u03B1\u1F30\u03B8\u1F74\u03C1",es:"eter",it:"etere",fr:"ether",en:"aether"}
},

    path:["PIE *keh2s-","Griego \u03BA\u03CC\u03C3\u03BC\u03BF\u03C2 (kosmos)","Pit.agoras: kosmos = orden universal","Latin mundus (traduccion)","Espanol: cosmos, cosmico, cosmologia"],

{
  id:"nous",
  lemma:"\u03BD\u03BF\u1EFE\u03C2 (nous)",
  lang:"greek",
  pos:"sustantivo (3a decl., masc.)",
  themes:["I","VII"],
  level:"intermedio",
  ipa:"/nu\u0301s/",
  defs:["Mente, intelecto, razon; la facultad suprema del conocimiento.","En Anaxagoras: la mente que ordena el cosmos; en Aristoteles: el pensamiento del pensamiento."],
  etym:{
    pie:"*h2neh3- (percibir, comprender)",
    path:["PIE *h2neh3-","Griego \u03BD\u03BF\u03AD\u03C9 (noeo, percibir)","Griego \u03BD\u03BF\u1EFE\u03C2 (nous, mente)","Latin mens, intellectus (traducciones)","Espanol: noesis, gnosis (raiz emparentada)"],
    notes:"Para Anaxagoras, el nous era una sustancia infinita, autosuficiente y omnisciente que puso en movimiento el cosmos y lo ordena. Aristoteles lo convirtio en Dios: el pensamiento puro que piensa a si mismo (noesis noeseos). Plotino lo identifico con el Intelecto divino, la segunda hipostasis de su sistema. El nous esta en la raiz de toda la tradicion intelectual occidental."
  },
  evo:[],
  deriv:[{w:"noesis",l:"es",u:"conocimiento intuitivo"},{w:"paranoia",l:"es",u:"delirios paranoicos"},{w:"gnosis",l:"es",u:"conocimiento espiritual"},{w:"noetic",l:"en",u:"noetic sciences"},{w:"gnostique",l:"fr",u:"les gnostiques"}],

  cmp:{griego:"\u03BD\u03BF\u1EFE\u03C2",es:"intelecto",it:"mente",fr:"esprit",en:"mind"}
},

{
  id:"eudaimonia",
  lemma:"\u03B5\u1F50\u03B4\u03B1\u03B9\u03BC\u03BF\u03BD\u03AF\u03B1 (eudaimonia)",
  lang:"greek",
  pos:"sustantivo (1a decl., fem.)",
  themes:["I","VI"],
  level:"intermedio",
  ipa:"/eu.dai.mo.\u02C8ni.a/",
  defs:["Felicidad, florecimiento humano, vida lograda y plena.","Para Aristoteles: el fin supremo de la vida humana, alcanzado mediante el ejercicio de la virtud."],
  etym:{
    pie:"*dheh1- (poner, colocar) + *daimon (divinidad)",
    path:["PIE *dheh1-","Griego \u03B4\u03B1\u1F77\u03BC\u03C9\u03BD (daimon, divinidad tutelar)","Griego \u03B5\u1F50- (eu- = bien) + \u03B4\u03B1\u03B9\u03BC\u03BF\u03BD\u03AF\u03B1","Latin felicitas (traduccion)","Espanol: eudaimonia (prestamo culto), felicidad"],
    notes:"Eudaimonia no es simplemente placer o alegria. Es el florecimiento integral del ser humano, la vida vivida conforme a la razon y la virtud. Aristoteles la define en la Etica a Nicomaco como actividad del alma conforme a la virtud perfecta. Los estoicos la identifican con la vida segun naturaleza. Etimologicamente, una persona eudaimon es aquella a la que le acompaña un buen daimon."
  },
  evo:[],
  deriv:[{w:"eudaimonia",l:"es",u:"la busqueda de la eudaimonia"},{w:"feliz",l:"es",u:"un dia feliz"},{w:"felicite",l:"fr",u:"le bonheur et la felicite"},{w:"eudaimonia",l:"en",u:"eudaimonic well-being"},{w:"felice",l:"it",u:"essere felice"}],
  cogn:[{w:"felicitas",l:"la",m:"felicidad"},{w:"daimon",l:"grc",m:"divinidad, genio"}],
  example:"\u00AB\u03A4\u1F76 \u1F00\u03C1\u03B5\u03C4\u1F70\u03B9 \u1F04\u03C1\u03B9\u03C3\u03C4\u03BF\u03BD \u03C4\u03BF\u1F77\u03C2 \u1F10\u03BD \u1F40\u03C1\u03B9\u03C3\u03C4\u1F77\u1FBF \u03C0\u03C1\u1F70\u03B3\u03BC\u03B1\u03C4\u03B9 \u03B5\u1F50\u03B4\u03B1\u03B9\u03BC\u03BF\u03BD\u03AF\u03B1.\u00BB \u2014 Aristoteles, Etica a Nicomaco",
  cmp:{griego:"\u03B5\u1F50\u03B4\u03B1\u03B9\u03BC\u03BF\u03BD\u03AF\u03B1",es:"felicidad",it:"felicita",fr:"bonheur",en:"happiness"}

  themes:["I","VI"],
  level:"basico",
  ipa:"/\u00E0.re\u0301.te\u0301/",
  defs:["Excelencia, virtud, la culminacion de las capacidades propias.","En Homero: valor guerrero; en filosofia: perfeccion moral e intelectual."],
  etym:{
    pie:"*h2er- (conectar, ajustar, ser apto)",
    path:["PIE *h2er-","Griego \u1F00\u03C1\u03B9\u03C3\u03C4\u03AC\u03C9 (aristaos, el mejor)","Griego \u1F00\u03C1\u03B5\u03C4\u1F74 (arete, excelencia)","Latin virtus (traduccion, no cognado)","Prestamos: aristocracia"],
    notes:"Arete es la excelencia en cualquier ambito: la del atleta, la del artesano, la del guerrero, la del filosofo. En Homero, arete es ante todo valor en combate. Los sofistas la extendieron a la arete civica (competencia politica). Socrates y Platon la reinterpretaron como conocimiento moral: quien conoce el bien, lo practica. Aristoteles la situa en el termino medio entre el exceso y el defecto."
  },
  evo:[],
  deriv:[{w:"aristocracia",l:"es",u:"gobierno aristocratico"},{w:"virtud",l:"es",u:"virtud cardenal"},{w:"aristocrate",l:"fr",u:"l'aristocrate"},{w:"aristocracy",l:"en",u:"natural aristocracy"}],
  cogn:[{w:"virtus",l:"la",m:"virtud, hombr a"},{w:"aristoi",l:"grc",m:"los mejores"}],
  example:"\u00AB\u0389\u03B8\u03B5 \u03B3\u03B1\u03C1 \u1F65\u03BD\u03B5\u03BA\u03B1 \u03C4\u1F76\u03BD \u1F00\u03C1\u03B5\u03C4\u1F74\u03BD.\u00BB \u2014 Homero, Iliada",

},

  lemma:"\u03C0\u03B1\u03B9\u03B4\u03B5\u03AF\u03B1 (paideia)",
  lang:"greek",
  pos:"sustantivo (1a decl., fem.)",
  themes:["I","III","VI"],
  level:"intermedio",
  ipa:"/pai.\u02C8de\u0301.a/",
  defs:["Educacion, formacion cultural integral; el proceso de humanizacion.","En la antigua Grecia: la formacion del ciudadano libre en todas sus dimensiones."],
  etym:{
    pie:"*ped- (nio) + *deh2- (actuar)",
    path:["PIE *ped- (nio)","Griego \u03C0\u03B1\u1FBF\u03C2 (pais, nio)","Griego \u03C0\u03B1\u03B9\u03B4\u03B5\u03AF\u03B1 (paideia, educacion del nio)","Latin educatio (traduccion)","Espanol: pedagogia, pediatria (raiz ped-)"],
    notes:"Paideia no es simplemente instruccion academica. Es la formacion integral del ser humano como ciudadano libre y moral. Werner Jaeger la llamo el ideal de la cultura griega. Incluye gimnasia, musica, poesia, retorica y filosofia. Para los griegos, un hombre sin paideia era un barbaro. La palabra sigue viva en enciclopedia (enkyklios paideia: educacion circular) y pedagogia."
  },
  evo:[],
  deriv:[{w:"pedagogia",l:"es",u:"pedagogia moderna"},{w:"enciclopedia",l:"es",u:"una enciclopedia completa"},{w:"pediatria",l:"es",u:"pediatria infantil"},{w:"pedagogy",l:"en",u:"critical pedagogy"},{w:"pedagogie",l:"fr",u:"pedagogie nouvelle"}],
  cogn:[{w:"educatio",l:"la",m:"educacion"},{w:"pais",l:"grc",m:"nio"}],
  example:"\u00AB\u03A0\u03B1\u03B9\u03B4\u03B5\u03AF\u03B1 \u1F90\u03BD\u03B5\u03C3\u03C4\u03B9 \u1F28\u03BB\u03BB\u03B7\u03BD\u03B9\u03BA\u03BF\u1F76\u03C2 \u03B3\u1F7F\u03BD\u03B1\u03B9 \u03C0\u1F72\u03BD\u03C4\u03C9\u03BD \u03BA\u03B1\u1F76 \u03C0\u03BF\u03BB\u03B9\u03C4\u1F77\u03C9\u03BD.\u00BB \u2014 Werner Jaeger (parafraesis)",
  cmp:{griego:"\u03C0\u03B1\u03B9\u03B4\u03B5\u03AF\u03B1",es:"educacion",it:"educazione",fr:"education",en:"education"}

    notes:"El agon era fundamental en la cultura griega. Las Olimpiadas eran agones. El teatro tragico se estructura en agon (el debate entre personajes). La democracia ateniense era esencialmente agonistica: ciudadanos que competian por persuadir a la asamblea. Nietzsche recupero el agon como principio creativo en El nacimiento de la tragedia."
  },

{
  id:"mimesis",
  lemma:"\u03BC\u03AF\u03BC\u03B7\u03C3\u03B9\u03C2 (mimesis)",
  lang:"greek",
  pos:"sustantivo (3a decl., fem.)",
  themes:["II","VIII"],
  level:"intermedio",
  ipa:"/mi\u0301.me\u0301.sis/",
  defs:["Imitacion, representacion, re-creacion de la realidad mediante el arte.","En Aristoteles: la capacidad humana natural de representar y comprender mediante la imitacion."],
  etym:{
    pie:"*mey- (imitar, parecerse a)",
    path:["PIE *mey-","Griego \u03BC\u1FE6\u03BC\u03BF\u03C2 (mimos, imitador)","Griego \u03BC\u03AF\u03BC\u03B7\u03C3\u03B9\u03C2 (mimesis, imitacion)","Prestamos: mimo, mimo, mimetismo"],
    notes:"Aristoteles dedica gran parte de la Poetica a la mimesis. No la entiende como copia servil, sino como re-creacion creativa de la realidad. El arte mimetico es para Aristoteles una actividad natural y placentera del ser humano. Platn, en cambio, desconfia de la mimesis en la Republica: el arte imita la imitacion, alejandonos de la Verdad. Este debate (Platon vs. Aristoteles) define toda la estetica occidental."
  },
  evo:[],

      }
      if (!found && e.cogn) {
        for (var c = 0; c < e.cogn.length; c++) {
          if (e.cogn[c].w.toLowerCase().indexOf(q) !== -1) { found = true; break; }
        }
      }
      if (!found) {
        var exText = getExampleText(e.example);
        if (exText.toLowerCase().indexOf(q) !== -1) found = true;
      }
      if (!found) continue;
    }
    results.push(e);
  }
  return results;
}

function esc(str) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function renderEntries() {
  var filtered = filterEntries();
  var html = "";
  html += '<div class="results-counter">' + filtered.length + ' entrada' + (filtered.length !== 1 ? "s" : "") + '</div>';

  if (filtered.length === 0) {
    html += '<div class="no-results">No se encontraron resultados.<small>Intenta con otra busqueda o selecciona un area tematica.</small></div>';
    mainContent.innerHTML = html;
    return;
  }

  var featured = ["logos", "physis"];
  var sorted = filtered.slice().sort(function(a, b) {
    var aI = featured.indexOf(a.id);
    var bI = featured.indexOf(b.id);
    if (aI !== -1 && bI === -1) return -1;
    if (aI === -1 && bI !== -1) return 1;
    return 0;
  });

  for (var i = 0; i < sorted.length; i++) {
    html += renderEntry(sorted[i]);
  }
  mainContent.innerHTML = html;
}

function renderEntry(e) {
  var featured = (e.id === "logos" || e.id === "physis") ? " featured" : "";
  var h = '<article class="entry-card' + featured + '" id="' + e.id + '">';
  h += '<div class="entry-header">';
  h += '<span class="entry-lemma">' + esc(e.lemma) + '</span>';
  h += '<span class="entry-pos">' + esc(e.pos) + '</span>';
  if (e.ipa) h += '<span class="entry-ipa">' + esc(e.ipa) + '</span>';
  h += '<span class="entry-level">' + esc(e.level) + ' &middot; GRIEGO</span>';
  h += '</div>';
  h += '<div class="entry-body">';

  h += '<dl class="entry-def"><dt>Definiciones</dt>';
  for (var d = 0; d < e.defs.length; d++) {
    var def = e.defs[d];
    var defText = typeof def === 'string' ? def : def.text;
    var defAudience = typeof def === 'string' ? null : def.audience;
    var defClass = defAudience ? ' lvl-' + defAudience : '';
    h += '<dd class="' + defClass + '">' + esc(defText) + '</dd>';
  }
  h += '</dl>';

  h += '<div class="etym-section"><h4>Etimologia</h4>';
  h += '<div class="etym-path">';
  if (e.etym.pie) h += '<span class="node">' + esc(e.etym.pie) + '</span>';
  for (var p = 0; p < e.etym.path.length; p++) {
    var pathNode = e.etym.path[p];
    var pathText = typeof pathNode === 'string' ? pathNode : (pathNode.form || pathNode.stage || '');
    var pathTitle = typeof pathNode === 'string' ? '' : (pathNode.note || '');
    h += '<span class="arrow">&rarr;</span><span class="node" title="' + esc(pathTitle) + '">' + esc(pathText) + '</span>';
  }
  h += '</div>';
  h += '<p class="etym-notes">' + esc(e.etym.notes) + '</p>';
  h += '</div>';

  if (e.cmp) {
    h += '<div class="compare-section lvl-avanzado"><h4>Comparacion transcultural</h4>';
    h += '<table class="compare-table"><tr><th>Griego</th><th>Espanol</th><th>Italiano</th><th>Frances</th><th>Ingles</th></tr>';
    h += '<tr><td>' + esc(e.cmp.griego) + '</td><td>' + esc(e.cmp.es) + '</td><td>' + esc(e.cmp.it) + '</td><td>' + esc(e.cmp.fr) + '</td><td>' + esc(e.cmp.en) + '</td></tr>';
    h += '</table></div>';
  }

  if (e.deriv.length > 0) {
    h += '<div class="deriv-section"><h4>Derivados</h4><div class="deriv-grid">';
    for (var dv = 0; dv < e.deriv.length; dv++) {
      h += '<div class="deriv-item"><span>' + esc(e.deriv[dv].w) + '</span><span class="lang">' + esc(e.deriv[dv].l) + '</span></div>';
    }
    h += '</div></div>';
  }

  if (e.cogn.length > 0) {
    h += '<div class="cogn-section lvl-intermedio"><h4>Cognados</h4><div class="deriv-grid">';
    for (var c = 0; c < e.cogn.length; c++) {
      var ctext = esc(e.cogn[c].w);
      if (e.cogn[c].m) ctext += ' (' + esc(e.cogn[c].m) + ')';
      h += '<div class="deriv-item"><span>' + ctext + '</span><span class="lang">' + esc(e.cogn[c].l) + '</span></div>';
    }
    h += '</div></div>';
  }

  var exHtml = '';
  if (typeof e.example === 'string') {
    exHtml = esc(e.example);
  } else if (e.example && e.example.quote) {
    exHtml = '<div class="ex-quote">' + esc(e.example.quote) + '</div>';
    if (e.example.gloss) exHtml += '<div class="ex-gloss">' + esc(e.example.gloss) + '</div>';
    if (e.example.author || e.example.work) {
      exHtml += '<div class="ex-ref">— ' + esc(e.example.author || '') + (e.example.work ? ', <em>' + esc(e.example.work) + '</em>' : '') + '</div>';
    }
  }
  h += '<div class="entry-example">' + exHtml + '</div>';

  h += '<div style="margin-top:.7rem">';
  for (var t = 0; t < e.themes.length; t++) {
    var thm = null;
    for (var ti = 0; ti < THEMES.length; ti++) {
      if (THEMES[ti].id === e.themes[t]) { thm = THEMES[ti]; break; }
    }
    if (thm) h += '<span class="tag">' + esc(thm.label) + '</span>';
  }
  h += '</div>';

  h += '</div></article>';
  return h;
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  searchInput = document.getElementById("searchInput");
  mainContent = document.getElementById("mainContent");
  modeBar = document.getElementById("modeBar");
  themesNav = document.getElementById("themesNav");

  var thtml = "";
  for (var i = 0; i < THEMES.length; i++) {
    thtml += '<button class="theme-btn" data-theme="' + THEMES[i].id + '">' + THEMES[i].id + '</button>';
  }
  themesNav.innerHTML = thtml;

  themesNav.addEventListener("click", function(ev) {
    var btn = ev.target;
    if (btn.classList && btn.classList.contains("theme-btn")) {
      setTheme(btn.getAttribute("data-theme"));
    }
  });

  modeBar.addEventListener("click", function(ev) {
    var btn = ev.target;
    if (btn.classList && btn.classList.contains("mode-btn")) {
      setMode(btn.getAttribute("data-mode"));
    }
  });

  var debounceTimer = null;
  searchInput.addEventListener("input", function() {
    if (debounceTimer) clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      searchQuery = searchInput.value.trim();
      renderEntries();
    }, 150);
  });

  searchInput.addEventListener("keydown", function(ev) {
    if (ev.key === "Enter") {
      searchQuery = searchInput.value.trim();
      renderEntries();
    }
  });

  renderEntries();
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();
</script>
